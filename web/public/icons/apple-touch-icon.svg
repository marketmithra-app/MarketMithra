  <!-- M letter -->
  <text x="90" y="130" font-family="Inter, Arial Black, sans-serif" font-size="112" font-weight="900" fill="#f59e0b" text-anchor="middle" letter-spacing="-2">M</text>
  <!-- Accent bar -->
  <rect x="52" y="148" width="76" height="4" rx="2" fill="#f59e0b"/>
