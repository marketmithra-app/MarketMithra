<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 290 52" fill="none">
  <style>
    .wm-market  { fill: #0f172a; }
    .wm-tagline { fill: #94a3b8; }
    @media (prefers-color-scheme: dark) {
      .wm-market  { fill: #f1f5f9; }
      .wm-tagline { fill: #64748b; }
    }
  </style>

  <!-- ── Wordmark: Market (adaptive) + Mithra (amber) ── -->
  <text x="0" y="36" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif" font-size="32" font-weight="800"><tspan class="wm-market">Market</tspan><tspan fill="#f59e0b">Mithra</tspan></text>

  <!-- ── Tagline ── -->
  <text
    x="2" y="50"
    font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif"
    font-size="11"
    font-weight="400"
    letter-spacing="0.3"
    class="wm-tagline"
  >the edge you deserve</text>
</svg>
