<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MarketMithra — Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      background: #0a0b10; color: #e2e8f0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      text-align: center; padding: 2rem;
    }
    .icon { font-size: 3rem; margin-bottom: 1rem; }
    h1 { font-size: 1.5rem; font-weight: 900; color: #f59e0b; margin-bottom: 0.5rem; }
    p  { font-size: 0.875rem; color: #94a3b8; max-width: 320px; line-height: 1.6; }
    a  { display: inline-block; margin-top: 1.5rem; padding: 0.6rem 1.5rem;
         background: #f59e0b; color: #0a0b10; font-weight: 700; font-size: 0.875rem;
         border-radius: 9999px; text-decoration: none; }
  </style>
</head>
<body>
  <div>
    <div class="icon">📡</div>
    <h1>You're offline</h1>
    <p>MarketMithra needs a connection to fetch live signals. Check your network and try again.</p>
    <a href="/" onclick="location.reload()">Retry</a>
  </div>
</body>
</html>
